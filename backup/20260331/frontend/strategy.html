<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="strategy.title">投资策略 - CLAW</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="module" src="/i18n/i18n.js"></script>
    <style>
        :root {
            --primary: #4a90d9;
            --secondary: #6c5ce7;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e17055;
            --dark: #2d3436;
            --light: #f5f6fa;
            --border: #dfe6e9;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--light); }
        
        /* 风险等级颜色 */
        .risk-1 { background: #00b894; }
        .risk-2 { background: #74b9ff; }
        .risk-3 { background: #fdcb6e; }
        .risk-4 { background: #e17055; }
        .risk-5 { background: #d63031; }
        
        .risk-badge { padding: 2px 8px; border-radius: 4px; color: white; font-size: 12px; }
        
        .strategy-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s;
            cursor: pointer;
        }
        .strategy-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        
        .match-score { 
            background: linear-gradient(135deg, #6c5ce7, #a29bfe); 
            color: white; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 14px; 
        }
        
        .quiz-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .quiz-modal.active { display: flex; }
        
        .quiz-option {
            display: block;
            padding: 16px 20px;
            margin: 10px 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quiz-option:hover { border-color: var(--primary); background: #f0f7ff; }
        .quiz-option.selected { border-color: var(--primary); background: #e8f4ff; }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .profile-tag {
            display: inline-block;
            padding: 4px 12px;
            background: #e8f4ff;
            color: var(--primary);
            border-radius: 12px;
            font-size: 12px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen">
        <!-- 顶部导航 -->
        <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4">
            <div class="max-w-6xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <a href="/dashboard" class="text-gray-600 hover:text-gray-800">
                        <i class="fas fa-arrow-left"></i> <span data-i18n="strategy.back">返回</span>
                    </a>
                    <h1 class="text-xl font-semibold text-gray-800">
                        <i class="fas fa-chart-pie text-purple-500 mr-2"></i><span data-i18n="strategy.title">投资策略</span>
                    </h1>
                </div>
                <div class="flex items-center gap-3">
                    <button id="lang-switch-btn"
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg flex items-center gap-2 text-sm">
                        <i class="fas fa-globe"></i>
                        <span id="lang-switch-text">EN</span>
                    </button>
                    <button onclick="openQuiz()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg flex items-center gap-2">
                        <i class="fas fa-robot"></i> <span data-i18n="strategy.modifyProfile">修改画像</span>
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-6">
            <!-- 用户画像信息 -->
            <div id="profileInfo" class="bg-gradient-to-r from-purple-500 to-indigo-500 rounded-xl p-6 text-white mb-6 hidden">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-lg font-medium mb-2" data-i18n="strategy.yourProfile">您的投资画像</h2>
                        <div id="profileTags" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="text-right">
                        <div class="text-sm opacity-80" data-i18n="strategy.profileCompleted">已完成风险测评</div>
                        <div class="text-2xl font-bold" data-i18n="strategy.completed">已完善</div>
                    </div>
                </div>
            </div>

            <!-- 引导完成测评 -->
            <div id="quizPrompt" class="bg-white rounded-xl p-8 text-center mb-6 shadow-sm">
                <i class="fas fa-user-circle text-6xl text-gray-300 mb-4"></i>
                <h2 class="text-xl font-semibold text-gray-800 mb-2" data-i18n="strategy.quizPrompt">完成风险测评，获取个性化推荐</h2>
                <p class="text-gray-500 mb-6" data-i18n="strategy.quizDesc">只需回答5个问题，我们将为您推荐最适合的投资策略</p>
                <button onclick="openQuiz()" class="bg-purple-500 hover:bg-purple-600 text-white px-8 py-3 rounded-lg text-lg">
                    <i class="fas fa-play mr-2"></i> <span data-i18n="strategy.startQuiz">开始测评</span>
                </button>
            </div>

            <!-- 为您推荐 -->
            <div id="recommendSection" class="mb-8 hidden">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-star text-yellow-500 mr-2"></i><span data-i18n="strategy.recommended">为您推荐</span>
                </h2>
                <div id="recommendList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <!-- 全部策略 -->
            <div>
                <h2 class="text-lg font-semibold text-gray-800 mb-4">
                    <i class="fas fa-th-large text-gray-400 mr-2"></i><span data-i18n="strategy.allStrategies">全部策略</span>
                </h2>
                
                <!-- 筛选器 -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <span class="text-gray-500 self-center mr-2" data-i18n="strategy.riskFilter">风险等级:</span>
                    <button class="filter-btn active" data-risk="0" onclick="filterByRisk(0)" data-i18n="strategy.all">全部</button>
                    <button class="filter-btn" data-risk="1" onclick="filterByRisk(1)" data-i18n="strategy.conservative">保守</button>
                    <button class="filter-btn" data-risk="2" onclick="filterByRisk(2)" data-i18n="strategy.steady">稳健</button>
                    <button class="filter-btn" data-risk="3" onclick="filterByRisk(3)" data-i18n="strategy.balanced">平衡</button>
                    <button class="filter-btn" data-risk="4" onclick="filterByRisk(4)" data-i18n="strategy.aggressive">激进</button>
                </div>
                
                <div id="strategyList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <!-- 问卷弹窗 -->
    <div id="quizModal" class="quiz-modal">
        <div class="bg-white rounded-xl w-full max-w-lg p-6 m-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold"><span data-i18n="strategy.quizTitle">风险测评</span> <span id="quizProgress">1/5</span></h2>
                <button onclick="closeQuiz()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div id="quizContent">
                <!-- 问题内容 -->
            </div>
            
            <div class="flex justify-between mt-6">
                <button id="prevBtn" onclick="prevQuestion()" class="px-4 py-2 text-gray-500 hidden" data-i18n="strategy.prev">上一题</button>
                <button id="nextBtn" onclick="nextQuestion()" class="px-6 py-2 bg-purple-500 text-white rounded-lg ml-auto" disabled data-i18n="strategy.next">下一题</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        const token = localStorage.getItem('claw_token');
        
        function authHeaders() {
            return token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
        }
        
        let userProfile = null;
        let allStrategies = [];
        let recommendStrategies = [];
        let currentFilter = 0;
        let quizAnswers = {};
        
        function getQuestions() {
            const _t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
            return [
                {
                    key: "capital_scale",
                    question: _t('strategy.q1'),
                    options: [
                        { value: "小资金", label: _t('strategy.q1a'), desc: _t('strategy.q1aDesc') },
                        { value: "中等",   label: _t('strategy.q1b'), desc: _t('strategy.q1bDesc') },
                        { value: "大资金", label: _t('strategy.q1c'), desc: _t('strategy.q1cDesc') }
                    ]
                },
                {
                    key: "risk_tolerance",
                    question: _t('strategy.q2'),
                    options: [
                        { value: "保守", label: _t('strategy.q2a'), desc: _t('strategy.q2aDesc') },
                        { value: "稳健", label: _t('strategy.q2b'), desc: _t('strategy.q2bDesc') },
                        { value: "平衡", label: _t('strategy.q2c'), desc: _t('strategy.q2cDesc') },
                        { value: "激进", label: _t('strategy.q2d'), desc: _t('strategy.q2dDesc') }
                    ]
                },
                {
                    key: "investment_goal",
                    question: _t('strategy.q3'),
                    options: [
                        { value: "保值",   label: _t('strategy.q3a'), desc: _t('strategy.q3aDesc') },
                        { value: "增值",   label: _t('strategy.q3b'), desc: _t('strategy.q3bDesc') },
                        { value: "增长",   label: _t('strategy.q3c'), desc: _t('strategy.q3cDesc') },
                        { value: "高回报", label: _t('strategy.q3d'), desc: _t('strategy.q3dDesc') }
                    ]
                },
                {
                    key: "experience_level",
                    question: _t('strategy.q4'),
                    options: [
                        { value: "小白",   label: _t('strategy.q4a'), desc: _t('strategy.q4aDesc') },
                        { value: "有经验", label: _t('strategy.q4b'), desc: _t('strategy.q4bDesc') },
                        { value: "专业",   label: _t('strategy.q4c'), desc: _t('strategy.q4cDesc') }
                    ]
                },
                {
                    key: "time_horizon",
                    question: _t('strategy.q5'),
                    options: [
                        { value: "短期", label: _t('strategy.q5a'), desc: _t('strategy.q5aDesc') },
                        { value: "中期", label: _t('strategy.q5b'), desc: _t('strategy.q5bDesc') },
                        { value: "长期", label: _t('strategy.q5c'), desc: _t('strategy.q5cDesc') }
                    ]
                }
            ];
        }
        
        let currentQuestion = 0;
        
        // 策略描述翻译映射
        const _strategyDescMap = {
          '以美股核心科技股为主，强调长期持有和现金管理，适合风险厌恶型投资者。配置重点在NVDA、GOOGL等优质标的，保留充足现金应对波动。': 'strategy.conservativeCoreDesc',
          '核心仓位+成长仓位的平衡配置，在稳健基础上追求增长。包含AI基础设施、云计算等前沿赛道，同时通过sell put策略增强收益。': 'strategy.balancedGrowthDesc',
          '重仓AI和前沿科技，追求高回报。适合能承受较大波动的投资者，包含量子计算、加密货币等高风险高回报标的。': 'strategy.aggressiveTechDesc',
          '专注于通过sell put期权策略获取权利金收入，特别适合震荡市或温和上涨市场。优先选择TSLA等高流动性标的，设置合理行权价。': 'strategy.sellPutIncomeDesc',
          '将加密货币作为资产配置的一部分，通过BTC和ETH获取数字黄金收益。建议通过ETF或小额直接配置，控制总体仓位。': 'strategy.cryptoHedgeDesc',
          '提前布局量子计算赛道，以IONQ为核心标的。这是5-10年的长期赛道，适合能承受高波动、追求爆发性增长的投资者。': 'strategy.quantumFutureDesc'
        };
        
        function translateStrategyDesc(text) {
          if (!text) return '';
          const key = _strategyDescMap[text];
          if (!key) return text;
          return t(key, text);
        }
        
        // 初始化
        document.addEventListener("DOMContentLoaded", async () => {
            await loadProfile();
            await loadStrategies();
            await loadRecommendations();
        });
        
        async function loadProfile() {
            try {
                const res = await fetch("/api/strategy/profile", { headers: authHeaders() });
                const data = await res.json();
                userProfile = data;
                
                if (data.has_profile && data.is_completed) {
                    document.getElementById("quizPrompt").classList.add("hidden");
                    document.getElementById("profileInfo").classList.remove("hidden");
                    document.getElementById("recommendSection").classList.remove("hidden");
                    
                    // 将中文值映射到英文翻译键
                    const riskTagMap = { '保守': 'Conservative', '稳健': 'Steady', '平衡': 'Balanced', '激进': 'Aggressive' };
                    const expTagMap = { '小白': 'Beginner', '有经验': 'Experienced', '专业': 'Expert' };
                    const horizonTagMap = { '短期': 'ShortTerm', '中期': 'MidTerm', '长期': 'LongTerm' };
                    
                    const tags = [
                        t(`strategy.profileTag${riskTagMap[data.risk_tolerance] || 'Conservative'}`, data.risk_tolerance) + t('strategy.profileTagRiskType', '型'),
                        data.capital_scale === "小资金" ? t('strategy.profileTagSmallCapital', '小资金') : 
                        data.capital_scale === "大资金" ? t('strategy.profileTagLargeCapital', '大资金') : 
                        t('strategy.profileTagMediumCapital', '中等资金'),
                        t(`strategy.profileTag${expTagMap[data.experience_level] || 'Beginner'}`, data.experience_level),
                        t(`strategy.profileTag${horizonTagMap[data.time_horizon] || 'LongTerm'}`, data.time_horizon) + t('strategy.profileTagInvestment', '投资')
                    ];
                    document.getElementById("profileTags").innerHTML = tags.map(tag => `<span class="profile-tag">${tag}</span>`).join("");
                } else {
                    document.getElementById("quizPrompt").classList.remove("hidden");
                    document.getElementById("profileInfo").classList.add("hidden");
                    document.getElementById("recommendSection").classList.add("hidden");
                }
            } catch (e) {
                console.error("加载画像失败", e);
            }
        }
        
        async function loadStrategies() {
            try {
                const res = await fetch("/api/strategy/list", { headers: authHeaders() });
                const data = await res.json();
                allStrategies = data.strategies || [];
                renderStrategyList(allStrategies);
            } catch (e) {
                console.error("加载策略列表失败", e);
            }
        }
        
        async function loadRecommendations() {
            try {
                const res = await fetch("/api/strategy/recommend", { headers: authHeaders() });
                const data = await res.json();
                recommendStrategies = data.recommendations || [];
                renderRecommendations(recommendStrategies);
            } catch (e) {
                console.error("加载推荐失败", e);
            }
        }
        
        function renderRecommendations(list) {
            const container = document.getElementById("recommendList");
            const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
            if (!list.length) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-8">
                        <i class="fas fa-search text-4xl text-gray-300 mb-3"></i>
                        <p class="text-gray-400">${t('strategy.noMatch')}</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = list.map(s => createStrategyCard(s, true)).join("");
        }
        
        function renderStrategyList(list) {
            const container = document.getElementById("strategyList");
            container.innerHTML = list.map(s => createStrategyCard(s, false)).join("");
        }
        
        function createStrategyCard(s, showMatchScore) {
            const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
            const riskLabels = {1: t('strategy.conservative'), 2: t('strategy.steady'), 3: t('strategy.balanced'), 4: t('strategy.aggressive'), 5: t('strategy.aggressive')};
            const tags = s.tags || [];
            const tagsHtml = tags.slice(0, 2).map(tag => `<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">${tag}</span>`).join("");
            
            // 翻译 min_capital 中的中文数字
            let minCapitalText = s.min_capital || '';
            if (minCapitalText.includes('万+')) {
                const num = parseInt(minCapitalText);
                if (num >= 100) {
                    minCapitalText = `${num/100}M+`; // 100万+ → 1M+
                } else {
                    minCapitalText = `${num * 10}K+`; // 15万+ → 150K+
                }
            }
            
            return `
                <div class="strategy-card" onclick="viewStrategy('${s.id}')">
                    <div class="flex items-start justify-between mb-3">
                        <div>
                            <h3 class="font-semibold text-gray-800">${s.name}</h3>
                            <p class="text-sm text-gray-500 mt-1">${translateStrategyDesc(s.description)?.substring(0, 60)}...</p>
                        </div>
                        ${showMatchScore ? `<span class="match-score">${t('strategy.matchScore')} ${s.match_score}%</span>` : ''}
                    </div>
                    <div class="flex items-center gap-3 mb-3">
                        <span class="risk-badge risk-${s.risk_level}">${riskLabels[s.risk_level]}</span>
                        <span class="text-sm text-gray-500">${minCapitalText}</span>
                        <span class="text-sm text-gray-500">${t('strategy.expectedReturn')} ${s.expected_return}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex gap-1">${tagsHtml}</div>
                        <i class="fas fa-chevron-right text-gray-300"></i>
                    </div>
                </div>
            `;
        }
        
        function filterByRisk(level) {
            currentFilter = level;
            document.querySelectorAll(".filter-btn").forEach(btn => {
                btn.classList.toggle("active", parseInt(btn.dataset.risk) === level);
            });
            
            const filtered = level === 0 ? allStrategies : allStrategies.filter(s => s.risk_level === level);
            renderStrategyList(filtered);
        }
        
        function viewStrategy(id) {
            window.location.href = `/strategy/${id}`;
        }
        
        // 问卷功能
        function openQuiz() {
            document.getElementById("quizModal").classList.add("active");
            currentQuestion = 0;
            quizAnswers = {};
            renderQuestion();
        }
        
        function closeQuiz() {
            document.getElementById("quizModal").classList.remove("active");
        }
        
        function renderQuestion() {
            const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
            const questions = getQuestions();
            const q = questions[currentQuestion];
            document.getElementById("quizProgress").textContent = `${currentQuestion + 1}/${questions.length}`;
            
            let html = `<p class="text-lg font-medium text-gray-800 mb-4">${q.question}</p>`;
            q.options.forEach(opt => {
                const selected = quizAnswers[q.key] === opt.value ? "selected" : "";
                html += `<label class="quiz-option ${selected}" onclick="selectOption('${q.key}', '${opt.value}', this)">
                    <div class="font-medium">${opt.label}</div>
                    <div class="text-sm text-gray-500">${opt.desc}</div>
                </label>`;
            });
            
            document.getElementById("quizContent").innerHTML = html;
            
            document.getElementById("prevBtn").classList.toggle("hidden", currentQuestion === 0);
            document.getElementById("nextBtn").textContent = currentQuestion === questions.length - 1 ? t('strategy.submit') : t('strategy.next');
            document.getElementById("nextBtn").disabled = !quizAnswers[q.key];
        }
        
        function selectOption(key, value, el) {
            quizAnswers[key] = value;
            document.querySelectorAll(".quiz-option").forEach(o => o.classList.remove("selected"));
            el.classList.add("selected");
            document.getElementById("nextBtn").disabled = false;
        }
        
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }
        
        function nextQuestion() {
            if (currentQuestion < getQuestions().length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                submitProfile();
            }
        }
        
        async function submitProfile() {
            const t = window.i18n ? window.i18n.t.bind(window.i18n) : (k) => k;
            try {
                const res = await fetch("/api/strategy/profile", {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(quizAnswers)
                });
                
                if (res.ok) {
                    closeQuiz();
                    await loadProfile();
                    await loadRecommendations();
                    alert(t('strategy.profileUpdated'));
                }
            } catch (e) {
                alert(t('strategy.saveFailed'));
            }
        }
        
        // Language switch button update
        function updateLangButton() {
            const lang = window.i18n.getCurrentLang();
            document.getElementById('lang-switch-text').textContent = lang === 'zh' ? 'EN' : '中文';
        }
        document.addEventListener('i18n-ready', updateLangButton);
        document.addEventListener('language-changed', updateLangButton);
        setTimeout(updateLangButton, 100);
        
        // Language switch button click handler
        document.getElementById('lang-switch-btn').addEventListener('click', function() {
            const currentLang = window.i18n.getCurrentLang();
            window.i18n.switchLanguage(currentLang === 'zh' ? 'en' : 'zh');
        });
        
        // Handle language change - refresh data to update translations
        document.addEventListener('languageChanged', () => {
            loadProfile();
            loadStrategies();
            loadRecommendations();
            // Re-render quiz question if modal is open
            if (document.getElementById("quizModal").classList.contains("active")) {
                renderQuestion();
            }
        });
        document.addEventListener('language-changed', () => {
            loadProfile();
            loadStrategies();
            loadRecommendations();
            if (document.getElementById("quizModal").classList.contains("active")) {
                renderQuestion();
            }
        });
    </script>
</body>
</html>
