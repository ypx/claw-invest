services:
  - type: web
    name: claw-invest
    runtime: python-3.11
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn backend:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLAW_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER_CACHE_BUST
        value: "2025-03-25-v2"
