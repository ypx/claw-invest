<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人中心 · Claw</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --bg-primary: #f7f3ef;
      --bg-secondary: #ffffff;
      --bg-elevated: #f2ede8;
      --bg-hover: rgba(180,120,60,0.06);
      --text-primary: #2c2420;
      --text-secondary: #7a6a60;
      --text-tertiary: #a89a90;
      --border-default: #e8ddd5;
      --border-subtle: #f0e8e0;
      --accent-primary: #b87333;
      --accent-secondary: #d4915a;
      --accent-light: rgba(184,115,51,0.1);
      --success: #5a8a6a;
      --danger: #c0392b;
      --danger-light: rgba(192,57,43,0.08);
      --shadow-sm: 0 1px 3px rgba(44,36,32,0.06);
      --shadow-md: 0 4px 16px rgba(44,36,32,0.08);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ─── TopBar ─── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-default);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .topbar-back {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-default);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
    }
    .topbar-back:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--accent-primary);
    }
    .topbar-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    /* ─── Layout ─── */
    .container {
      max-width: 680px;
      margin: 32px auto;
      padding: 0 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Card ─── */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .card-header-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-primary);
      font-size: 14px;
    }
    .card-header-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .card-body {
      padding: 20px;
    }

    /* ─── Avatar Block ─── */
    .avatar-block {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
    }
    .avatar-big {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(184,115,51,0.3);
    }
    .avatar-info h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .avatar-info .role-badge {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-light);
      color: var(--accent-primary);
    }
    .avatar-info .email {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ─── Info Row ─── */
    .info-row {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      width: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .info-value {
      flex: 1;
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
    }

    /* ─── Form ─── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color .15s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent-primary);
      background: var(--bg-secondary);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-hint {
      margin-top: 5px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 13px;
      padding: 2px 4px;
    }
    .input-wrap .toggle-pw:hover { color: var(--text-secondary); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: none;
    }
    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-secondary); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
    }
    .btn-outline:hover { border-color: var(--accent-primary); color: var(--text-primary); }
    .btn-danger {
      background: var(--danger-light);
      border: 1px solid rgba(192,57,43,0.2);
      color: var(--danger);
    }
    .btn-danger:hover { background: rgba(192,57,43,0.15); }
    .btn-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    /* ─── Alert ─── */
    .alert {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: none;
      margin-top: 14px;
    }
    .alert.success { background: rgba(90,138,106,0.12); color: #3a6a4a; border: 1px solid rgba(90,138,106,0.25); }
    .alert.error { background: var(--danger-light); color: var(--danger); border: 1px solid rgba(192,57,43,0.2); }
    .alert.show { display: block; }

    /* ─── Danger Zone ─── */
    .danger-zone {
      padding: 20px;
    }
    .danger-zone-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .logout-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .logout-row:last-child { border-bottom: none; }
    .logout-row-info h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .logout-row-info p {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all .25s;
      z-index: 9999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { background: var(--success); }
    #toast.error { background: var(--danger); }

    /* ─── Loading skeleton ─── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--border-subtle) 50%, var(--bg-elevated) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 14px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

<!-- ─── TopBar ─── -->
<div class="topbar">
  <a class="topbar-back" href="/dashboard">
    <i class="fa fa-chevron-left"></i> 返回
  </a>
  <div class="topbar-title">个人中心</div>
</div>

<!-- ─── Content ─── -->
<div class="container">

  <!-- 账户信息 -->
  <div class="card">
    <div class="avatar-block" id="avatar-block">
      <div class="avatar-big" id="pf-avatar">Z</div>
      <div class="avatar-info">
        <h2 id="pf-username"><span class="skeleton" style="width:80px;display:inline-block"></span></h2>
        <div class="role-badge" id="pf-role">加载中…</div>
        <div class="email" id="pf-email">…</div>
      </div>
    </div>
    <div class="card-body" style="padding-top:0">
      <div class="info-row">
        <div class="info-label">用户名</div>
        <div class="info-value" id="info-username">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">邮箱</div>
        <div class="info-value" id="info-email">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">角色</div>
        <div class="info-value" id="info-role">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">注册时间</div>
        <div class="info-value" id="info-created">—</div>
      </div>
    </div>
  </div>

  <!-- 投资偏好设置 -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon"><i class="fa fa-sliders"></i></div>
      <div class="card-header-title">投资偏好</div>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">现金余额（美元）</label>
          <input class="form-input" type="number" id="pref-cash" placeholder="例：50000" min="0" />
          <div class="form-hint">计入总资产用于仓位计算</div>
        </div>
        <div class="form-group">
          <label class="form-label">目标现金占比（%）</label>
          <input class="form-input" type="number" id="pref-target-cash" placeholder="例：35" min="0" max="100" />
          <div class="form-hint">低于此比例触发风险预警</div>
        </div>
      </div>
      <div id="pref-alert" class="alert"></div>
      <div class="btn-actions">
        <button class="btn btn-primary" onclick="savePref()">
          <i class="fa fa-check"></i> 保存设置
        </button>
      </div>
    </div>
  </div>

  <!-- 修改密码 -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon"><i class="fa fa-lock"></i></div>
      <div class="card-header-title">修改密码</div>
    </div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">当前密码</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="old-pw" placeholder="输入当前密码" autocomplete="current-password" />
          <button class="toggle-pw" type="button" onclick="togglePw('old-pw',this)"><i class="fa fa-eye"></i></button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">新密码</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="new-pw" placeholder="至少6位" autocomplete="new-password" />
            <button class="toggle-pw" type="button" onclick="togglePw('new-pw',this)"><i class="fa fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">确认新密码</label>
          <div class="input-wrap">
            <input class="form-input" type="password" id="confirm-pw" placeholder="再次输入新密码" autocomplete="new-password" />
            <button class="toggle-pw" type="button" onclick="togglePw('confirm-pw',this)"><i class="fa fa-eye"></i></button>
          </div>
        </div>
      </div>
      <div id="pw-alert" class="alert"></div>
      <div class="btn-actions">
        <button class="btn btn-primary" id="pw-btn" onclick="changePassword()">
          <i class="fa fa-shield-halved"></i> 修改密码
        </button>
      </div>
    </div>
  </div>

  <!-- 账户操作 -->
  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:var(--danger-light);color:var(--danger)"><i class="fa fa-right-from-bracket"></i></div>
      <div class="card-header-title">账户操作</div>
    </div>
    <div class="danger-zone">
      <div class="logout-row">
        <div class="logout-row-info">
          <h4>退出登录</h4>
          <p>清除本地凭证，返回登录页</p>
        </div>
        <button class="btn btn-danger" onclick="doLogout()">
          <i class="fa fa-right-from-bracket"></i> 退出登录
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API = '';
const token = localStorage.getItem('claw_token');

if (!token) { location.href = '/login'; }

// ─── Toast ───
function showToast(msg, type='success', duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = ''; }, duration);
}

// ─── Toggle password visibility ───
function togglePw(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.querySelector('i').className = isText ? 'fa fa-eye' : 'fa fa-eye-slash';
}

// ─── Load user info ───
async function loadUser() {
  try {
    const res = await fetch(API + '/api/auth/me', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) { location.href = '/login'; return; }
    const u = await res.json();

    // Avatar
    const initial = (u.username || 'Z')[0].toUpperCase();
    document.getElementById('pf-avatar').textContent = initial;
    document.getElementById('pf-username').textContent = u.username || '—';
    document.getElementById('pf-email').textContent = u.email || '未设置邮箱';
    document.getElementById('pf-role').textContent = u.role === 'admin' ? '管理员' : '个人投资者';

    // Info rows
    document.getElementById('info-username').textContent = u.username || '—';
    document.getElementById('info-email').textContent = u.email || '未绑定';
    document.getElementById('info-role').textContent = u.role === 'admin' ? '管理员' : '个人投资者';
    document.getElementById('info-created').textContent = u.created_at
      ? new Date(u.created_at).toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' })
      : '未知';

    // Pref
    const pf = u.profile || {};
    document.getElementById('pref-cash').value = pf.cash ?? '';
    document.getElementById('pref-target-cash').value = pf.target_cash_ratio ?? 35;

  } catch(e) {
    showToast('加载用户信息失败', 'error');
  }
}

// ─── Save preferences ───
async function savePref() {
  const cash = parseFloat(document.getElementById('pref-cash').value);
  const target = parseFloat(document.getElementById('pref-target-cash').value);
  const alertEl = document.getElementById('pref-alert');

  if (isNaN(cash) || cash < 0) {
    alertEl.textContent = '请输入有效的现金金额（≥ 0）';
    alertEl.className = 'alert error show';
    return;
  }
  if (isNaN(target) || target < 0 || target > 100) {
    alertEl.textContent = '目标现金比例需在 0–100 之间';
    alertEl.className = 'alert error show';
    return;
  }

  try {
    const res = await fetch(API + '/api/user/profile', {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ cash, target_cash_ratio: target })
    });
    if (!res.ok) throw new Error((await res.json()).detail || '保存失败');
    alertEl.textContent = '✓ 偏好设置已保存';
    alertEl.className = 'alert success show';
    setTimeout(() => alertEl.className = 'alert', 3000);
    showToast('投资偏好已保存');
  } catch(e) {
    alertEl.textContent = e.message;
    alertEl.className = 'alert error show';
  }
}

// ─── Change password ───
async function changePassword() {
  const oldPw = document.getElementById('old-pw').value.trim();
  const newPw = document.getElementById('new-pw').value;
  const confirmPw = document.getElementById('confirm-pw').value;
  const alertEl = document.getElementById('pw-alert');
  const btn = document.getElementById('pw-btn');

  alertEl.className = 'alert';

  if (!oldPw) {
    alertEl.textContent = '请输入当前密码';
    alertEl.className = 'alert error show';
    return;
  }
  if (newPw.length < 6) {
    alertEl.textContent = '新密码至少需要 6 位';
    alertEl.className = 'alert error show';
    return;
  }
  if (newPw !== confirmPw) {
    alertEl.textContent = '两次输入的新密码不一致';
    alertEl.className = 'alert error show';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 处理中…';

  try {
    const res = await fetch(API + '/api/user/change-password', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ old_password: oldPw, new_password: newPw })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '修改失败');
    alertEl.textContent = '✓ 密码修改成功！下次登录请使用新密码';
    alertEl.className = 'alert success show';
    document.getElementById('old-pw').value = '';
    document.getElementById('new-pw').value = '';
    document.getElementById('confirm-pw').value = '';
    showToast('密码已修改');
  } catch(e) {
    alertEl.textContent = e.message;
    alertEl.className = 'alert error show';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-shield-halved"></i> 修改密码';
  }
}

// ─── Logout ───
function doLogout() {
  if (!confirm('确定要退出登录吗？')) return;
  localStorage.clear();
  location.href = '/login';
}

// ─── Init ───
loadUser();
</script>
</body>
</html>
