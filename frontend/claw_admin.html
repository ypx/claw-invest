<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claw · 管理后台</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
    }
    :root {
      --bg-page: #0d1117; --bg-sidebar: #161b22; --bg-card: #161b22;
      --bg-card2: #1c2230; --bg-hover: #21262d; --border: #30363d;
      --border-light: #21262d; --text-primary: #e6edf3; --text-muted: #7d8590;
      --text-dim: #484f58; --accent-blue: #388bfd; --accent-blue2: #58a6ff;
      --accent-green: #3fb950; --accent-red: #f85149; --accent-yellow: #d29922;
      --accent-purple: #a371f7; --accent-orange: #f0883e;
      --sidebar-w: 220px; --header-h: 56px;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); min-height: 100vh;
      background: var(--bg-sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed;
      left: 0; top: 0; bottom: 0; z-index: 100;
    }
    .sidebar-logo {
      height: var(--header-h); display: flex; align-items: center;
      gap: 10px; padding: 0 20px; border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #f85149, #d29922);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; color: #fff;
    }
    .logo-text { font-weight: 700; font-size: 15px; }
    .logo-badge {
      margin-left: auto; font-size: 9px; font-weight: 700;
      background: rgba(248,81,73,.15); color: var(--accent-red);
      border: 1px solid rgba(248,81,73,.3); border-radius: 10px; padding: 1px 6px;
    }
    .sidebar-section { padding: 16px 12px 4px; }
    .sidebar-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-dim);
      padding: 0 8px; margin-bottom: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      border-radius: 6px; cursor: pointer; color: var(--text-muted);
      font-size: 13px; font-weight: 500; transition: all .15s;
      position: relative;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active {
      background: rgba(248,81,73,.1); color: #f85149;
    }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; background: #f85149; border-radius: 0 2px 2px 0;
    }
    .nav-item i { width: 16px; text-align: center; font-size: 13px; }
    .sidebar-footer {
      margin-top: auto; padding: 12px; border-top: 1px solid var(--border);
    }
    .user-card {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: 8px; cursor: pointer; transition: background .15s;
    }
    .user-card:hover { background: var(--bg-hover); }
    .user-avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #f85149, #d29922);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: #fff;
    }
    .user-name { font-size: 13px; font-weight: 600; }
    .user-role { font-size: 11px; color: var(--text-muted); }

    /* ── Main ── */
    #main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    #topbar {
      height: var(--header-h); background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border); display: flex;
      align-items: center; padding: 0 24px; gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-weight: 600; font-size: 15px; }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      width: 32px; height: 32px; border: 1px solid var(--border);
      background: transparent; border-radius: 6px; color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Pages ── */
    .page { display: none; padding: 24px; animation: fadeIn .2s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity:0;transform:translateY(4px); } to { opacity:1;transform:none; } }

    /* ── Cards & Grid ── */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
    .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    .mb-16 { margin-bottom: 16px; }
    .mb-24 { margin-bottom: 24px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .section-title i { color: var(--text-muted); }

    /* ── KPI ── */
    .kpi-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 18px 20px; transition: border-color .2s;
    }
    .kpi-card:hover { border-color: var(--accent-blue); }
    .kpi-row { display: flex; align-items: flex-start; justify-content: space-between; }
    .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
    .kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .kpi-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: var(--text-muted); padding: 10px 12px;
      text-align: left; border-bottom: 1px solid var(--border);
    }
    thead th.right { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border-light); transition: background .1s; }
    tbody tr:hover { background: rgba(255,255,255,.025); }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 12px; font-size: 13px; }
    td.right { text-align: right; }
    td.center { text-align: center; }

    /* ── Badge ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge-green { background: rgba(63,185,80,.12); color: var(--accent-green); border: 1px solid rgba(63,185,80,.25); }
    .badge-red { background: rgba(248,81,73,.12); color: var(--accent-red); border: 1px solid rgba(248,81,73,.25); }
    .badge-blue { background: rgba(56,139,253,.12); color: var(--accent-blue2); border: 1px solid rgba(56,139,253,.25); }
    .badge-yellow { background: rgba(210,153,34,.12); color: var(--accent-yellow); border: 1px solid rgba(210,153,34,.25); }
    .badge-purple { background: rgba(163,113,247,.12); color: var(--accent-purple); border: 1px solid rgba(163,113,247,.25); }

    /* ── Action Buttons ── */
    .action-btn {
      padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: 12px;
      color: var(--text-muted); transition: all .15s; margin-right: 4px;
    }
    .action-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .action-btn.danger:hover { border-color: var(--accent-red); color: var(--accent-red); }
    .action-btn.success:hover { border-color: var(--accent-green); color: var(--accent-green); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px; width: 440px; max-width: 95vw;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; display: block; }
    .form-input {
      width: 100%; padding: 9px 12px; background: #0d1117;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text-primary); font-size: 13px; outline: none;
    }
    .form-input:focus { border-color: var(--accent-blue); }
    .form-select {
      width: 100%; padding: 9px 12px; background: #0d1117;
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text-primary); font-size: 13px; outline: none;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-primary {
      padding: 8px 20px; background: var(--accent-blue); border: none;
      border-radius: 7px; color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary {
      padding: 8px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 7px; color: var(--text-muted); font-size: 13px;
      cursor: pointer; transition: all .15s;
    }
    .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

    /* ── Search ── */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 240px; padding: 8px 12px 8px 34px;
      background: #0d1117; border: 1px solid var(--border);
      border-radius: 7px; color: var(--text-primary); font-size: 13px; outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent-blue); }
    .search-wrap i {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim); font-size: 13px;
    }

    /* ── Pagination ── */
    .pagination { display: flex; gap: 6px; align-items: center; margin-top: 16px; justify-content: flex-end; }
    .page-btn {
      width: 30px; height: 30px; border: 1px solid var(--border);
      background: transparent; border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: var(--text-muted); transition: all .15s;
    }
    .page-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .page-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
    .page-info { font-size: 12px; color: var(--text-muted); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 12px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      z-index: 9999; opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: none; }
    .toast.success { background: var(--accent-green); color: #fff; }
    .toast.error { background: var(--accent-red); color: #fff; }

    /* ── Log table ── */
    .log-action { font-size: 11px; font-family: monospace; color: var(--accent-blue2); }
    .log-time { font-size: 11px; color: var(--text-dim); }

    /* ── Online dot ── */
    .live-dot { width: 6px; height: 6px; background: var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(63,185,80,.4);} 50%{opacity:.8;box-shadow:0 0 0 4px rgba(63,185,80,0);} }

    .spin { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width:1100px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
    @media (max-width:768px) { .grid-4,.grid-3,.grid-2,.grid-2-1 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<!-- ── Sidebar ── -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon"><i class="fa fa-shield-halved" style="font-size:14px"></i></div>
    <span class="logo-text">Claw Admin</span>
    <span class="logo-badge">ADMIN</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">系统</div>
    <div class="nav-item active" data-page="overview" onclick="navigate('overview',this)">
      <i class="fa fa-gauge-high"></i> 系统概览
    </div>
    <div class="nav-item" data-page="users" onclick="navigate('users',this)">
      <i class="fa fa-users"></i> 用户管理
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-label">监控</div>
    <div class="nav-item" data-page="logs" onclick="navigate('logs',this)">
      <i class="fa fa-list-ul"></i> 操作日志
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="admin-avatar">A</div>
      <div>
        <div class="user-name" id="admin-name">管理员</div>
        <div class="user-role">Administrator</div>
      </div>
    </div>
    <div style="margin-top:8px;display:flex;gap:8px;padding:0 4px">
      <button class="action-btn" style="flex:1" onclick="location.href='/dashboard'">
        <i class="fa fa-arrow-left"></i> 返回前台
      </button>
      <button class="action-btn danger" style="flex:1" onclick="doLogout()">
        <i class="fa fa-right-from-bracket"></i> 退出
      </button>
    </div>
  </div>
</nav>

<!-- ── Main ── -->
<div id="main">
  <header id="topbar">
    <div class="topbar-title" id="topbar-title">系统概览</div>
    <div class="topbar-actions">
      <div class="live-dot"></div>
      <span style="font-size:11px;color:var(--accent-green);font-weight:600">运行中</span>
      <button class="icon-btn" onclick="loadCurrentPage()" title="刷新"><i class="fa fa-rotate"></i></button>
      <span id="last-update" style="font-size:11px;color:var(--text-dim)">加载中…</span>
    </div>
  </header>

  <!-- ═══════ PAGE: OVERVIEW ═══════ -->
  <div class="page active" id="page-overview">
    <div class="grid-4 mb-16" id="stats-grid">
      <!-- 由 JS 填充 -->
      <div class="kpi-card"><div class="kpi-label">加载中…</div><div class="kpi-value">—</div></div>
      <div class="kpi-card"><div class="kpi-label">加载中…</div><div class="kpi-value">—</div></div>
      <div class="kpi-card"><div class="kpi-label">加载中…</div><div class="kpi-value">—</div></div>
      <div class="kpi-card"><div class="kpi-label">加载中…</div><div class="kpi-value">—</div></div>
    </div>

    <div class="grid-2">
      <!-- 系统信息 -->
      <div class="card">
        <div class="section-header">
          <div class="section-title"><i class="fa fa-server"></i> 系统信息</div>
        </div>
        <div id="sys-info"></div>
      </div>

      <!-- 快速操作 -->
      <div class="card">
        <div class="section-header">
          <div class="section-title"><i class="fa fa-bolt"></i> 快速操作</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="action-btn" style="width:100%;padding:10px;justify-content:flex-start;display:flex;align-items:center;gap:8px" onclick="navigate('users',document.querySelector('[data-page=users]'))">
            <i class="fa fa-user-plus" style="color:var(--accent-blue2)"></i> 管理用户
          </button>
          <button class="action-btn" style="width:100%;padding:10px;justify-content:flex-start;display:flex;align-items:center;gap:8px" onclick="openAddUserModal()">
            <i class="fa fa-plus" style="color:var(--accent-green)"></i> 新建用户
          </button>
          <button class="action-btn" style="width:100%;padding:10px;justify-content:flex-start;display:flex;align-items:center;gap:8px" onclick="navigate('logs',document.querySelector('[data-page=logs]'))">
            <i class="fa fa-list-ul" style="color:var(--accent-purple)"></i> 查看操作日志
          </button>
          <button class="action-btn" style="width:100%;padding:10px;justify-content:flex-start;display:flex;align-items:center;gap:8px" onclick="location.href='/docs'" >
            <i class="fa fa-code" style="color:var(--accent-yellow)"></i> API 文档
          </button>
        </div>
      </div>
    </div>
  </div><!-- /overview -->

  <!-- ═══════ PAGE: USERS ═══════ -->
  <div class="page" id="page-users">
    <div class="section-header">
      <div class="section-title"><i class="fa fa-users"></i> 用户管理</div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="search-wrap">
          <i class="fa fa-search"></i>
          <input type="text" id="user-search" placeholder="搜索用户名…" oninput="filterUsers()" />
        </div>
        <button class="btn-primary" onclick="openAddUserModal()">
          <i class="fa fa-plus"></i> 新建用户
        </button>
      </div>
    </div>

    <div class="card mb-16">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>用户</th>
              <th>邮箱</th>
              <th class="center">角色</th>
              <th class="center">状态</th>
              <th class="right">持仓数</th>
              <th>注册时间</th>
              <th>最近登录</th>
              <th class="center">操作</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="users-pagination"></div>
    </div>
  </div><!-- /users -->

  <!-- ═══════ PAGE: LOGS ═══════ -->
  <div class="page" id="page-logs">
    <div class="section-header">
      <div class="section-title"><i class="fa fa-list-ul"></i> 操作日志</div>
      <button class="icon-btn" onclick="loadLogs()"><i class="fa fa-rotate"></i></button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>用户</th>
              <th>操作</th>
              <th>详情</th>
              <th>时间</th>
            </tr>
          </thead>
          <tbody id="logs-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="logs-pagination"></div>
    </div>
  </div><!-- /logs -->

</div><!-- /main -->

<!-- ── Add/Edit User Modal ── -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">新建用户</div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" type="text" id="m-username" placeholder="2-20 位字符" />
    </div>
    <div class="form-group">
      <label class="form-label">邮箱</label>
      <input class="form-input" type="email" id="m-email" placeholder="user@email.com" />
    </div>
    <div class="form-group" id="m-pw-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" id="m-password" placeholder="至少 6 位" />
    </div>
    <div class="form-group">
      <label class="form-label">角色</label>
      <select class="form-select" id="m-role">
        <option value="user">普通用户</option>
        <option value="admin">管理员</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="modal-confirm-btn" onclick="submitUserModal()">创建</button>
    </div>
  </div>
</div>

<!-- ── Confirm Modal ── -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="width:360px">
    <div class="modal-title" id="confirm-title">确认操作</div>
    <div id="confirm-body" style="font-size:13px;color:var(--text-muted);margin-bottom:8px"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeConfirm()">取消</button>
      <button class="btn-primary" style="background:var(--accent-red)" id="confirm-ok-btn">确认</button>
    </div>
  </div>
</div>

<script>
const API = '';  // 相对路径，兼容所有访问方式
let token = localStorage.getItem('claw_token');
let currentPage = 'overview';
let usersData = [];
let usersPage = 1;
let logsPage = 1;
const PAGES = { overview:'系统概览', users:'用户管理', logs:'操作日志' };

// ── 认证 ──
if (!token) { location.href = '/login'; }
async function authFetch(url, opts={}) {
  const res = await fetch(API + url, {
    ...opts,
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (res.status === 401) { localStorage.clear(); location.href = '/login'; }
  return res;
}

// ── 初始化 ──
async function init() {
  const res = await authFetch('/api/auth/me');
  if (!res.ok) { location.href = '/login'; return; }
  const u = await res.json();
  if (u.role !== 'admin') { location.href = '/dashboard'; return; }
  document.getElementById('admin-name').textContent = u.username;
  document.getElementById('admin-avatar').textContent = u.username[0].toUpperCase();
  // 从 hash 恢复页面
  const initPage = location.hash.replace('#/','') || 'overview';
  navigate(PAGES[initPage] ? initPage : 'overview', null, false);
}

// ── Navigation ──
function navigate(page, el, push=true) {
  if (!PAGES[page]) page = 'overview';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const navEl = el || document.querySelector('[data-page=' + page + ']');
  if (navEl) navEl.classList.add('active');
  document.getElementById('topbar-title').textContent = PAGES[page] || page;
  currentPage = page;
  if (push) history.pushState({ page }, '', '#/' + page);
  if (page === 'overview') loadOverview();
  else if (page === 'users') loadUsers();
  else if (page === 'logs') loadLogs();
}

window.addEventListener('popstate', e => {
  const p = (e.state && e.state.page) || location.hash.replace('#/','') || 'overview';
  navigate(p, null, false);
});

// ── Toast ──
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ══════════════════════════════════
// USERS
// ══════════════════════════════════
async function loadUsers(page=1) {
  usersPage = page;
  const res = await authFetch(`/api/admin/users?page=${page}&limit=15`);
  if (!res.ok) return;
  const data = await res.json();
  usersData = data.users;
  renderUsersTable(data.users);
  renderPagination('users-pagination', data.total, 15, page, loadUsers);
}

function renderUsersTable(users) {
  const tbody = document.getElementById('users-body');
  const q = document.getElementById('user-search').value.toLowerCase();
  const filtered = q ? users.filter(u => u.username.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) : users;
  tbody.innerHTML = '';
  filtered.forEach(u => {
    const roleBadge = u.role === 'admin'
      ? '<span class="badge badge-red">管理员</span>'
      : '<span class="badge badge-blue">用户</span>';
    const statusBadge = u.is_active
      ? '<span class="badge badge-green">正常</span>'
      : '<span class="badge badge-yellow">禁用</span>';
    const toggleLabel = u.is_active ? '禁用' : '启用';
    const toggleClass = u.is_active ? 'danger' : 'success';
    tbody.innerHTML += `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#388bfd,#a371f7);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff">${u.username[0].toUpperCase()}</div>
          <span style="font-weight:600">${u.username}</span>
        </div>
      </td>
      <td style="color:var(--text-muted)">${u.email}</td>
      <td class="center">${roleBadge}</td>
      <td class="center">${statusBadge}</td>
      <td class="right">${u.holdings_count}</td>
      <td style="color:var(--text-muted);font-size:12px">${fmtDate(u.created_at)}</td>
      <td style="color:var(--text-muted);font-size:12px">${u.last_login ? fmtDate(u.last_login) : '—'}</td>
      <td class="center">
        <button class="action-btn ${toggleClass}" onclick="toggleUser('${u.id}',${u.is_active},'${u.username}')">${toggleLabel}</button>
        <button class="action-btn danger" onclick="confirmDelete('${u.id}','${u.username}')">删除</button>
      </td>
    </tr>`;
  });
}

function filterUsers() { renderUsersTable(usersData); }

async function toggleUser(id, currentActive, username) {
  const newActive = !currentActive;
  const res = await authFetch(`/api/admin/users/${id}`, {
    method: 'PATCH',
    body: JSON.stringify({ is_active: newActive })
  });
  if (res.ok) {
    showToast(`已${newActive ? '启用' : '禁用'} ${username}`);
    loadUsers(usersPage);
  } else {
    const d = await res.json();
    showToast(d.detail || '操作失败', 'error');
  }
}

// ── Delete confirm ──
let pendingDeleteId = null;
function confirmDelete(id, username) {
  pendingDeleteId = id;
  document.getElementById('confirm-title').textContent = '删除用户';
  document.getElementById('confirm-body').innerHTML = `确认删除用户 <strong>${username}</strong>？此操作将同时删除该用户的所有持仓数据，<strong>不可恢复</strong>。`;
  document.getElementById('confirm-ok-btn').onclick = doDeleteUser;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); pendingDeleteId = null; }
async function doDeleteUser() {
  if (!pendingDeleteId) return;
  const res = await authFetch(`/api/admin/users/${pendingDeleteId}`, { method: 'DELETE' });
  closeConfirm();
  if (res.ok) { showToast('用户已删除'); loadUsers(usersPage); }
  else { const d = await res.json(); showToast(d.detail || '删除失败', 'error'); }
}

// ── Add User Modal ──
let editUserId = null;
function openAddUserModal() {
  editUserId = null;
  document.getElementById('modal-title').textContent = '新建用户';
  document.getElementById('modal-confirm-btn').textContent = '创建';
  document.getElementById('m-username').value = '';
  document.getElementById('m-email').value = '';
  document.getElementById('m-password').value = '';
  document.getElementById('m-role').value = 'user';
  document.getElementById('m-pw-group').style.display = '';
  document.getElementById('user-modal').classList.add('open');
}
function closeModal() { document.getElementById('user-modal').classList.remove('open'); }
async function submitUserModal() {
  const body = {
    username: document.getElementById('m-username').value.trim(),
    email: document.getElementById('m-email').value.trim(),
    password: document.getElementById('m-password').value,
  };
  if (!body.username || !body.email || !body.password) { showToast('请填写完整信息', 'error'); return; }
  const res = await authFetch('/api/auth/register', { method: 'POST', body: JSON.stringify(body) });
  if (res.ok) {
    // 如果是 admin 角色，还要 patch
    const d = await res.json();
    const role = document.getElementById('m-role').value;
    if (role === 'admin') {
      // 需要先获取 user id，查询用户列表
      const listRes = await authFetch('/api/admin/users?limit=100');
      if (listRes.ok) {
        const listData = await listRes.json();
        const newUser = listData.users.find(u => u.username === body.username);
        if (newUser) await authFetch(`/api/admin/users/${newUser.id}`, { method: 'PATCH', body: JSON.stringify({ role: 'admin' }) });
      }
    }
    showToast('用户创建成功');
    closeModal();
    loadUsers(1);
  } else {
    const d = await res.json(); showToast(d.detail || '创建失败', 'error');
  }
}

// ══════════════════════════════════
// LOGS
// ══════════════════════════════════
async function loadLogs(page=1) {
  logsPage = page;
  const res = await authFetch(`/api/admin/logs?page=${page}&limit=25`);
  if (!res.ok) return;
  const data = await res.json();
  const tbody = document.getElementById('logs-body');
  tbody.innerHTML = '';
  data.logs.forEach(l => {
    const actionColors = {
      login: 'var(--accent-green)', register: 'var(--accent-blue2)',
      logout: 'var(--text-muted)', add_holding: 'var(--accent-purple)',
      update_holding: 'var(--accent-yellow)', delete_holding: 'var(--accent-red)',
      admin_update_user: 'var(--accent-orange)', admin_delete_user: 'var(--accent-red)',
    };
    const color = actionColors[l.action] || 'var(--text-muted)';
    tbody.innerHTML += `<tr>
      <td><span style="font-weight:600">${l.username || '—'}</span></td>
      <td><span class="log-action" style="color:${color}">${l.action}</span></td>
      <td style="color:var(--text-muted);font-size:12px">${l.detail || '—'}</td>
      <td class="log-time">${fmtDate(l.created_at)}</td>
    </tr>`;
  });
  renderPagination('logs-pagination', data.total, 25, page, loadLogs);
}

// ── Pagination ──
function renderPagination(containerId, total, limit, currentPage, loadFn) {
  const totalPages = Math.ceil(total / limit);
  const el = document.getElementById(containerId);
  if (totalPages <= 1) { el.innerHTML = ''; return; }
  let html = `<span class="page-info">共 ${total} 条</span>`;
  if (currentPage > 1) html += `<button class="page-btn" onclick="${loadFn.name}(${currentPage-1})"><i class="fa fa-chevron-left"></i></button>`;
  for (let i = Math.max(1,currentPage-2); i <= Math.min(totalPages,currentPage+2); i++) {
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="${loadFn.name}(${i})">${i}</button>`;
  }
  if (currentPage < totalPages) html += `<button class="page-btn" onclick="${loadFn.name}(${currentPage+1})"><i class="fa fa-chevron-right"></i></button>`;
  el.innerHTML = html;
}

// ── Utils ──
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function doLogout() {
  localStorage.clear(); location.href = '/login';
}

// ── Init ──
init();
</script>
