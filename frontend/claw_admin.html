<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 · Claw</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d27;
      --bg-elevated: #20232f;
      --bg-hover: rgba(255,255,255,0.04);
      --text-primary: #e8eaf0;
      --text-secondary: #8b90a0;
      --text-tertiary: #555a6a;
      --border-default: #2a2d3a;
      --border-subtle: #1e2130;
      --accent: #6366f1;
      --accent-light: rgba(99,102,241,0.12);
      --success: #22c55e;
      --success-light: rgba(34,197,94,0.1);
      --danger: #ef4444;
      --danger-light: rgba(239,68,68,0.1);
      --warning: #f59e0b;
      --warning-light: rgba(245,158,11,0.1);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ─── Layout ─── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 220px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-brand {
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border-default);
    }
    .sidebar-brand h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .sidebar-brand .sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .nav { flex: 1; padding: 12px 8px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .15s;
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-light); color: var(--accent); }
    .nav-item i { width: 16px; text-align: center; font-size: 13px; }
    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-footer .admin-info {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .sidebar-footer .admin-info strong {
      color: var(--text-secondary);
      display: block;
      margin-bottom: 2px;
    }

    /* ─── Main ─── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      display: flex;
      align-items: center;
      padding: 0 24px;
      height: 52px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-default);
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 15px; font-weight: 600; flex: 1; }
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ─── Page ─── */
    .page { display: none; }
    .page.active { display: block; }

    /* ─── Stats Grid ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.danger { color: var(--danger); }
    .stat-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    /* ─── Card ─── */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border-default);
    }
    .card-title { font-size: 14px; font-weight: 600; }
    .card-body { padding: 18px; }

    /* ─── Table ─── */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 1px solid var(--border-default);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-hover); }
    td strong { color: var(--text-primary); }

    /* ─── Badge ─── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green { background: var(--success-light); color: var(--success); }
    .badge-red { background: var(--danger-light); color: var(--danger); }
    .badge-purple { background: var(--accent-light); color: var(--accent); }
    .badge-yellow { background: var(--warning-light); color: var(--warning); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: none;
    }
    .btn-sm { padding: 4px 8px; font-size: 11px; }
    .btn-ghost { background: transparent; border: 1px solid var(--border-default); color: var(--text-secondary); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger-ghost { background: transparent; border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
    .btn-danger-ghost:hover { background: var(--danger-light); }
    .btn-accent { background: var(--accent); color: white; }
    .btn-accent:hover { opacity: 0.9; }

    /* ─── Info row ─── */
    .info-kv {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .info-kv-row {
      display: flex;
      gap: 12px;
      font-size: 13px;
    }
    .info-kv-key {
      width: 140px;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .info-kv-val { color: var(--text-secondary); word-break: break-all; }

    /* ─── Pagination ─── */
    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-top: 1px solid var(--border-default);
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .pagination .spacer { flex: 1; }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--text-primary);
      color: var(--bg-primary);
      padding: 9px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all .2s;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); color: white; }
    #toast.success { background: var(--success); color: white; }

    /* ─── Empty ─── */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    /* ─── Loading ─── */
    .loading {
      text-align: center;
      padding: 30px;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .loading i { margin-right: 6px; }

    /* ─── Search ─── */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-tertiary); }
  </style>
</head>
<body>

<div class="layout">
  <!-- ─── Sidebar ─── -->
  <div class="sidebar">
    <div class="sidebar-brand">
      <h1>⚙ Claw Admin</h1>
      <div class="sub">管理后台</div>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="showPage('stats',this)">
        <i class="fa fa-chart-pie"></i> 系统概览
      </button>
      <button class="nav-item" onclick="showPage('users',this)">
        <i class="fa fa-users"></i> 用户管理
      </button>
      <button class="nav-item" onclick="showPage('logs',this)">
        <i class="fa fa-scroll"></i> 操作日志
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info">
        <strong id="admin-name">加载中…</strong>
        <span id="admin-role">—</span>
      </div>
      <button class="nav-item" onclick="location.href='/dashboard'">
        <i class="fa fa-arrow-left"></i> 返回主仪表盘
      </button>
      <button class="nav-item" onclick="doLogout()">
        <i class="fa fa-right-from-bracket"></i> 退出登录
      </button>
    </div>
  </div>

  <!-- ─── Main ─── -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">系统概览</div>
      <button class="btn btn-ghost" onclick="refreshCurrent()">
        <i class="fa fa-rotate"></i> 刷新
      </button>
    </div>
    <div class="content">

      <!-- ── 系统概览 ── -->
      <div class="page active" id="page-stats">
        <div class="stats-grid" id="stats-grid">
          <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中…</div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">服务器信息</div></div>
          <div class="card-body">
            <div class="info-kv" id="server-info">
              <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中…</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── 用户管理 ── -->
      <div class="page" id="page-users">
        <div class="search-bar">
          <input class="search-input" id="user-search" placeholder="搜索用户名或邮箱…" oninput="filterUsers()" />
          <button class="btn btn-ghost" onclick="loadUsers()"><i class="fa fa-rotate"></i> 刷新</button>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">用户列表</div>
            <span id="user-count" style="font-size:12px;color:var(--text-tertiary)"></span>
          </div>
          <div id="users-table-wrap">
            <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中…</div>
          </div>
          <div class="pagination" id="users-pagination" style="display:none">
            <span id="users-page-info"></span>
            <div class="spacer"></div>
            <button class="btn btn-ghost btn-sm" id="users-prev" onclick="usersPage(-1)">上一页</button>
            <button class="btn btn-ghost btn-sm" id="users-next" onclick="usersPage(1)">下一页</button>
          </div>
        </div>
      </div>

      <!-- ── 操作日志 ── -->
      <div class="page" id="page-logs">
        <div class="card">
          <div class="card-header">
            <div class="card-title">操作日志</div>
            <button class="btn btn-ghost btn-sm" onclick="loadLogs()"><i class="fa fa-rotate"></i> 刷新</button>
          </div>
          <div id="logs-table-wrap">
            <div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中…</div>
          </div>
          <div class="pagination" id="logs-pagination" style="display:none">
            <span id="logs-page-info"></span>
            <div class="spacer"></div>
            <button class="btn btn-ghost btn-sm" id="logs-prev" onclick="logsPage(-1)">上一页</button>
            <button class="btn btn-ghost btn-sm" id="logs-next" onclick="logsPage(1)">下一页</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
const token = localStorage.getItem('claw_token');
let currentPage = 'stats';
let _usersPage = 1, _usersTotal = 0, _allUsers = [];
let _logsPage = 1, _logsTotal = 0;

if (!token) { location.href = '/login'; }

// ─── Toast ───
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2800);
}

// ─── Nav ───
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  currentPage = name;
  const titles = { stats:'系统概览', users:'用户管理', logs:'操作日志' };
  document.getElementById('topbar-title').textContent = titles[name] || name;
  if (name === 'stats') loadStats();
  if (name === 'users') loadUsers();
  if (name === 'logs') loadLogs();
}

function refreshCurrent() {
  if (currentPage === 'stats') loadStats();
  if (currentPage === 'users') loadUsers();
  if (currentPage === 'logs') loadLogs();
}

// ─── API helper ───
async function api(path, opts={}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (res.status === 401) { location.href = '/login'; return null; }
  if (res.status === 403) { showToast('需要管理员权限', 'error'); return null; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || '请求失败');
  return data;
}

// ─── Load current user ───
async function initAdmin() {
  try {
    const u = await api('/api/auth/me');
    if (!u) return;
    if (u.role !== 'admin') {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444;font-family:sans-serif"><h2>⛔ 无权限</h2><p style="margin-top:8px;color:#888">需要管理员账号</p><a href="/dashboard" style="color:#6366f1;margin-top:16px;display:inline-block">返回主页</a></div>';
      return;
    }
    document.getElementById('admin-name').textContent = u.username;
    document.getElementById('admin-role').textContent = u.role === 'admin' ? '系统管理员' : '普通用户';
    loadStats();
  } catch(e) { showToast('初始化失败: ' + e.message, 'error'); }
}

// ─── Stats ───
async function loadStats() {
  try {
    const d = await api('/api/admin/stats');
    if (!d) return;

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">总用户数</div>
        <div class="stat-value accent">${d.total_users}</div>
        <div class="stat-sub">活跃 ${d.active_users} 人</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日注册</div>
        <div class="stat-value success">${d.registrations_today}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">24h 登录</div>
        <div class="stat-value">${d.logins_last_24h}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">管理员数</div>
        <div class="stat-value">${d.admin_count}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">持仓记录</div>
        <div class="stat-value">${d.total_holdings}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">操作日志</div>
        <div class="stat-value">${d.total_audit_logs}</div>
      </div>
    `;

    document.getElementById('server-info').innerHTML = `
      <div class="info-kv-row"><div class="info-kv-key">数据库路径</div><div class="info-kv-val">${d.db_path}</div></div>
      <div class="info-kv-row"><div class="info-kv-key">服务器时间</div><div class="info-kv-val">${new Date(d.server_time).toLocaleString('zh-CN')}</div></div>
    `;
  } catch(e) { showToast('加载统计失败: ' + e.message, 'error'); }
}

// ─── Users ───
async function loadUsers() {
  document.getElementById('users-table-wrap').innerHTML = '<div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中…</div>';
  try {
    const d = await api(`/api/admin/users?page=${_usersPage}&limit=20`);
    if (!d) return;
    _allUsers = d.users;
    _usersTotal = d.total;
    document.getElementById('user-count').textContent = `共 ${_usersTotal} 个用户`;
    renderUsersTable(_allUsers);
    // pagination
    const totalPages = Math.ceil(_usersTotal / 20);
    if (totalPages > 1) {
      document.getElementById('users-pagination').style.display = '';
      document.getElementById('users-page-info').textContent = `第 ${_usersPage} / ${totalPages} 页`;
      document.getElementById('users-prev').disabled = _usersPage <= 1;
      document.getElementById('users-next').disabled = _usersPage >= totalPages;
    } else {
      document.getElementById('users-pagination').style.display = 'none';
    }
  } catch(e) {
    document.getElementById('users-table-wrap').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

function renderUsersTable(users) {
  if (!users.length) {
    document.getElementById('users-table-wrap').innerHTML = '<div class="empty">暂无用户</div>';
    return;
  }
  let html = `<table><thead><tr>
    <th>用户名</th><th>邮箱</th><th>角色</th><th>状态</th><th>持仓数</th><th>注册时间</th><th>操作</th>
  </tr></thead><tbody>`;
  for (const u of users) {
    const created = u.created_at ? new Date(u.created_at).toLocaleDateString('zh-CN') : '—';
    const roleBadge = u.role === 'admin'
      ? '<span class="badge badge-purple">管理员</span>'
      : '<span class="badge badge-green">用户</span>';
    const statusBadge = u.is_active
      ? '<span class="badge badge-green">正常</span>'
      : '<span class="badge badge-red">禁用</span>';
    html += `<tr>
      <td><strong>${u.username}</strong></td>
      <td>${u.email || '—'}</td>
      <td>${roleBadge}</td>
      <td>${statusBadge}</td>
      <td>${u.holdings_count || 0}</td>
      <td>${created}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="toggleUserStatus('${u.id}', ${u.is_active})" ${u.role==='admin'?'disabled title="不可操作管理员"':''}>
          ${u.is_active ? '<i class="fa fa-ban"></i> 禁用' : '<i class="fa fa-check"></i> 启用'}
        </button>
      </td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('users-table-wrap').innerHTML = html;
}

function filterUsers() {
  const q = document.getElementById('user-search').value.trim().toLowerCase();
  if (!q) { renderUsersTable(_allUsers); return; }
  renderUsersTable(_allUsers.filter(u =>
    (u.username||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)
  ));
}

function usersPage(dir) {
  _usersPage = Math.max(1, _usersPage + dir);
  loadUsers();
}

async function toggleUserStatus(userId, isActive) {
  try {
    await api(`/api/admin/users/${userId}`, {
      method: 'PATCH',
      body: JSON.stringify({ is_active: !isActive })
    });
    showToast(isActive ? '用户已禁用' : '用户已启用');
    loadUsers();
  } catch(e) { showToast(e.message, 'error'); }
}

// ─── Logs ───
async function loadLogs() {
  document.getElementById('logs-table-wrap').innerHTML = '<div class="loading"><i class="fa fa-spinner fa-spin"></i> 加载中…</div>';
  try {
    const d = await api(`/api/admin/logs?page=${_logsPage}&limit=30`);
    if (!d) return;
    _logsTotal = d.total;

    if (!d.logs.length) {
      document.getElementById('logs-table-wrap').innerHTML = '<div class="empty">暂无日志</div>';
      return;
    }

    const actionColors = {
      login: 'badge-green', logout: 'badge-yellow',
      register: 'badge-purple',
      add_holding: 'badge-green', delete_holding: 'badge-red',
      update_profile: 'badge-yellow', change_password: 'badge-yellow',
      admin_update_user: 'badge-purple', admin_delete_user: 'badge-red',
    };

    let html = `<table><thead><tr>
      <th>时间</th><th>用户</th><th>操作</th><th>详情</th>
    </tr></thead><tbody>`;
    for (const l of d.logs) {
      const t = l.created_at ? new Date(l.created_at).toLocaleString('zh-CN') : '—';
      const cls = actionColors[l.action] || 'badge-yellow';
      html += `<tr>
        <td style="font-size:11px;white-space:nowrap">${t}</td>
        <td><strong>${l.username || l.user_id?.slice(0,8) || '—'}</strong></td>
        <td><span class="badge ${cls}">${l.action}</span></td>
        <td style="font-size:11px;color:var(--text-tertiary);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.detail || '—'}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('logs-table-wrap').innerHTML = html;

    const totalPages = Math.ceil(_logsTotal / 30);
    if (totalPages > 1) {
      document.getElementById('logs-pagination').style.display = '';
      document.getElementById('logs-page-info').textContent = `第 ${_logsPage} / ${totalPages} 页，共 ${_logsTotal} 条`;
      document.getElementById('logs-prev').disabled = _logsPage <= 1;
      document.getElementById('logs-next').disabled = _logsPage >= totalPages;
    } else {
      document.getElementById('logs-pagination').style.display = 'none';
    }
  } catch(e) {
    document.getElementById('logs-table-wrap').innerHTML = `<div class="empty">加载失败: ${e.message}</div>`;
  }
}

function logsPage(dir) {
  _logsPage = Math.max(1, _logsPage + dir);
  loadLogs();
}

// ─── Logout ───
function doLogout() {
  localStorage.clear();
  location.href = '/login';
}

// ─── Init ───
initAdmin();
</script>
</body>
</html>
